version: "3.9"

services:
  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soundtracker-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount database (read-write for potential updates)
      - ./data:/app/data:rw
      # Mount assets (read-only for serving)
      - ./outputs:/app/outputs:ro
    environment:
      - DATABASE_URL=data/soundtrackers.db
      - ASSETS_PATH=outputs
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - soundtracker-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:8000
    container_name: soundtracker-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - soundtracker-network

networks:
  soundtracker-network:
    driver: bridge
    name: soundtracker-network

volumes:
  data:
    driver: local
  outputs:
    driver: local
