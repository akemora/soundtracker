name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: App/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Create test database
        run: |
          mkdir -p ../data
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          db_path = Path("../data/soundtrackers.db")
          schema_path = Path("../scripts/schema.sql")
          conn = sqlite3.connect(db_path)
          conn.executescript(schema_path.read_text())
          conn.execute(
              """
              INSERT INTO composers (
                  index_num,
                  name,
                  slug,
                  birth_year,
                  country,
                  biography,
                  style,
                  anecdotes
              )
              VALUES (?, ?, ?, ?, ?, ?, ?, ?)
              """,
              (
                  1,
                  "John Williams",
                  "john_williams",
                  1932,
                  "USA",
                  "Composer of film scores.",
                  "Orchestral film music.",
                  "Sample anecdotes.",
              ),
          )
          conn.commit()
          conn.close()
          PY

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: App/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --ci --coverage

      - name: Build
        run: npm run build
        env:
          API_URL: http://localhost:8000

  music-crawler:
    name: Music Crawler Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Music Crawler

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: Music Crawler/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest tests/ -v --tb=short
